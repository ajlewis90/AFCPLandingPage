{% load static %}
    <!-- Masthead Subscription Form - Enhanced Design -->
    <link rel="stylesheet" href="{% static 'css/business_sign_up.css' %}">
    
    <section class="masthead" style="background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 50%, #db2777 100%); position: relative; overflow: hidden;">
        <!-- Decorative overlay pattern -->
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.08) 0%, transparent 50%); pointer-events: none;"></div>
        
        <!-- Subtle animated shapes in background -->
        <div style="position: absolute; top: -100px; right: -100px; width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; filter: blur(60px);"></div>
        <div style="position: absolute; bottom: -100px; left: -100px; width: 300px; height: 300px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; filter: blur(60px);"></div>
        
        <div class="container-fluid pt-6 pb-6 px-7" style="position: relative; z-index: 2;">
            <!-- Top border accent -->
            <div style="width: 100px; height: 4px; background: linear-gradient(90deg, #ffffff 0%, rgba(255,255,255,0) 100%); margin: 0 auto 3rem;"></div>
            
            <div class="row display-flex justify-content-md-center">
                <div class="col-md-6 col-lg-5">
                    <!-- Enhanced heading with glow effect -->
                    <h3 style="color: #ffffff; font-size: 2.2rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; text-shadow: 0 2px 20px rgba(255,255,255,0.2); line-height: 1.4;">
                        Every store will have an AI Shopper Agent. Build yours first.
                    </h3>
                    <p style="color: rgba(255, 255, 255, 0.9); text-align: center; font-size: 1.1rem; margin-bottom: 3rem; line-height: 1.6;">
                        Join the commerce revolution. Create intelligent shopping experiences that delight your customers.
                    </p>
                </div>
            </div>
            
            <div class="row display-flex justify-content-md-center">
                <div class="col-md-7 col-lg-6 text-center">
                    <!-- Form container with glassmorphism effect -->
                    <div style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 3rem 2.5rem; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);">
                        <form id="business-signup-form" class="signup-form">
                            {% csrf_token %}
                            <div class="form-content">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group" style="margin-bottom: 1.5rem;">
                                            <input class="subscribe-controls" id="id_business_name" name="business_name" placeholder="Business Name" type="text" required 
                                                style="width: 100%; padding: 14px 18px; box-sizing: border-box; font-size: 15px; border-radius: 10px; border: 2px solid rgba(255, 255, 255, 0.3); background-color: rgba(255, 255, 255, 0.95); color: #1d1d1d; font-weight: 500; transition: all 0.3s ease;">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group" style="margin-bottom: 1.5rem;">
                                            <input class="subscribe-controls" id="id_business_email" name="business_email" placeholder="Business Email" type="email" required
                                                style="width: 100%; padding: 14px 18px; box-sizing: border-box; font-size: 15px; border-radius: 10px; border: 2px solid rgba(255, 255, 255, 0.3); background-color: rgba(255, 255, 255, 0.95); color: #1d1d1d; font-weight: 500; transition: all 0.3s ease;">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group" style="margin-bottom: 1.5rem;">
                                            <input class="subscribe-controls" id="id_contact_number" name="contact_number" placeholder="Contact Number" type="tel" required
                                                style="width: 100%; padding: 14px 18px; box-sizing: border-box; font-size: 15px; border-radius: 10px; border: 2px solid rgba(255, 255, 255, 0.3); background-color: rgba(255, 255, 255, 0.95); color: #1d1d1d; font-weight: 500; transition: all 0.3s ease;">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group" style="margin-bottom: 1.5rem;">
                                            <input class="subscribe-controls" id="id_contact_person_name" name="contact_person_name" placeholder="Contact Person Name" type="text" required
                                                style="width: 100%; padding: 14px 18px; box-sizing: border-box; font-size: 15px; border-radius: 10px; border: 2px solid rgba(255, 255, 255, 0.3); background-color: rgba(255, 255, 255, 0.95); color: #1d1d1d; font-weight: 500; transition: all 0.3s ease;">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group" style="margin-bottom: 1.5rem;">
                                            <input class="subscribe-controls" id="id_job_title" name="job_title" placeholder="Job Title" type="text" required
                                                style="width: 100%; padding: 14px 18px; box-sizing: border-box; font-size: 15px; border-radius: 10px; border: 2px solid rgba(255, 255, 255, 0.3); background-color: rgba(255, 255, 255, 0.95); color: #1d1d1d; font-weight: 500; transition: all 0.3s ease;">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group" style="margin-bottom: 1.5rem;">
                                            <input class="subscribe-controls" id="id_company_website" name="company_website" placeholder="Company Website" type="url" required
                                                style="width: 100%; padding: 14px 18px; box-sizing: border-box; font-size: 15px; border-radius: 10px; border: 2px solid rgba(255, 255, 255, 0.3); background-color: rgba(255, 255, 255, 0.95); color: #1d1d1d; font-weight: 500; transition: all 0.3s ease;">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-sm-12 form-group text-left">
                                        <div class="checkbox-wrapper" style="margin-bottom: 2rem; padding: 1rem; background: rgba(255, 255, 255, 0.1); border-radius: 8px;">
                                            <input type="checkbox" id="id_email_updates" name="email_updates" value="1" checked style="margin-right: 10px; width: 18px; height: 18px; cursor: pointer; vertical-align: middle;">
                                            <label for="id_email_updates" style="color: #ffffff; font-size: 14px; font-weight: 500; cursor: pointer; display: inline; vertical-align: middle; line-height: 1.5;">Get emails from AFCP about product updates, industry news, reports and events.</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-sm-12 form-group">
                                        <button class="btn btn-sign-up-daxedax btn-block" type="submit" 
                                            style="background: #ffffff; color: #1e3a8a; font-weight: 700; font-size: 1.1rem; padding: 16px 32px; border-radius: 10px; border: none; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); width: 100%;">
                                            Get Started Now
                                        </button>
                                        <p class="signup-success-response" style="color: #ffffff; margin-top: 1rem;"></p>
                                        <p class="signup-error-response" style="color: #ffcccc; margin-top: 1rem;"></p>
                                    </div>
                                </div>
                                <p class="lead mb-0 source spam-warning-text" style="margin-top: 1.5rem;">
                                    <span style="color: rgba(255, 255, 255, 0.8); font-size: 13px;">🔒 We respect your privacy. No spam, ever.</span>
                                </p>  
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
